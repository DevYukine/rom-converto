[package]
name = "rom-converto-lib"
version.workspace = true
edition.workspace = true
authors.workspace = true
description = "Library for converting, compressing, decompressing, encrypting, and decrypting ROMs."

[dependencies]
anyhow = "^1.0"
thiserror = "^2"
log = "^0.4"
tokio = { version = "^1", features = ["fs", "sync", "rt", "rt-multi-thread", "macros", "io-util"] }
futures = "^0.3"
async-recursion = "^1.1"
binrw = "^0.15"
byteorder = "1.5"
chrono = "^0.4"
lazy_static = "^1.5"

# RustCrypto ecosystem: pinned together, upgrade all at once when aes 0.9 / cbc 0.2 / ctr 0.10 / pbkdf2 0.13 go stable
aes = "^0.8"
cbc = "^0.1.2"
block-padding = "^0.3"
pbkdf2 = "^0.12.2"
hmac = "^0.12"
sha1 = "^0.10"
sha2 = "^0.10"
ctr = "^0.9.2"
hex = "^0.4"
md5 = "^0.8"
sha256 = "^1.6"
hex-literal = "^1.1"
crc = "^3.4"

# Compression
flate2 = { version = "^1.1", features = ["zlib-ng"], default-features = false }
lzma-sdk-sys = "^0.1"
flacenc = "^0.5"
claxon = "^0.4"
zstd = "^0.13"

# HTTP (for seed DB fetch)
reqwest = { version = "^0.13", default-features = false, features = ["charset", "http2", "system-proxy", "json", "stream", "rustls"] }

[dev-dependencies]
tempfile = "^3"
