name: Build CLI

on:
  workflow_call:
    inputs:
      ref:
        description: "Git ref to build. Defaults to the caller ref."
        required: false
        type: string
        default: ""
      release:
        description: "Upload build outputs to a GitHub Release instead of workflow artifacts."
        required: false
        type: boolean
        default: false
      release_tag:
        description: "Release tag to upload assets to when release is true."
        required: false
        type: string
        default: ""

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: CLI - ${{ matrix.classifier }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            classifier: linux-x64
            force_cross: false
          - os: ubuntu-22.04
            target: armv7-unknown-linux-gnueabihf
            classifier: linux-arm7
            force_cross: false
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            classifier: linux-arm64
            force_cross: false
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-musl
            classifier: linux-x64-musl
            force_cross: true
          - os: ubuntu-22.04
            target: x86_64-unknown-freebsd
            classifier: freebsd-x64
            force_cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            classifier: windows-x64
            force_cross: false
          - os: macos-latest
            target: x86_64-apple-darwin
            classifier: macos-x64
            force_cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            classifier: macos-arm64
            force_cross: false

    runs-on: ${{ matrix.os }}
    env:
      CARGO_TARGET_X86_64_UNKNOWN_FREEBSD_RUSTFLAGS: "-l stdc++"
      ROM_CONVERTO_RELEASE: ${{ inputs.release && '1' || '' }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Build release binary
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: "--locked --release -p rom-converto-cli"
          strip: true
          force-use-cross: ${{ matrix.force_cross }}

      - name: Package executable
        shell: bash
        run: |
          set -euo pipefail

          exe=""
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            exe=".exe"
          fi

          src="target/${{ matrix.target }}/release/rom-converto${exe}"
          dst="artifact/rom-converto-cli-${{ matrix.classifier }}${exe}"

          mkdir -p artifact
          cp "$src" "$dst"

      - name: Upload workflow artifact
        if: ${{ !inputs.release }}
        uses: actions/upload-artifact@v7
        with:
          name: rom-converto-cli-${{ matrix.classifier }}
          path: artifact/
          if-no-files-found: error

      - name: Upload to release
        if: ${{ inputs.release }}
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release_tag }}
          files: artifact/*
