name: "Test Commit"

env:
  CARGO_TERM_COLOR: always

on:
  pull_request:
  push:
    branches: [ "develop" ]
    paths:
      - crates/**
      - Cargo.toml
      - Cargo.lock
      - .github/workflows/tests.yml

jobs:
  check:
    name: Cargo check
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout Source code
        uses: actions/checkout@v6

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: check-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run cargo check (lib + cli)
        run: cargo check -p rom-converto-lib -p rom-converto-cli

  test:
    name: Cargo test
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout Source code
        uses: actions/checkout@v6

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: test-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run cargo test (lib + cli)
        run: cargo test -p rom-converto-lib -p rom-converto-cli

  fmt:
    name: Cargo fmt
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout Source code
        uses: actions/checkout@v6

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Run cargo fmt
        run: cargo fmt --all -- --check

  clippy:
    name: Cargo clippy
    runs-on: "ubuntu-latest"
    steps:
      - name: Checkout Source code
        uses: actions/checkout@v6

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: clippy-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Run cargo clippy (lib + cli)
        run: cargo clippy -p rom-converto-lib -p rom-converto-cli -- -D warnings
