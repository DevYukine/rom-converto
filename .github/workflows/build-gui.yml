name: "Build GUI for Commit"

on:
  pull_request:
  push:
    branches: [ "develop" ]
    paths:
      - crates/**
      - Cargo.toml
      - Cargo.lock
      - .github/workflows/build-gui.yml

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            classifier: linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            classifier: windows-x64
          - os: macos-latest
            target: x86_64-apple-darwin
            classifier: macos-x64
          - os: macos-latest
            target: aarch64-apple-darwin
            classifier: macos-arm64

    runs-on: ${{ matrix.os }}
    env:
      CARGO_TERM_COLOR: always

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: crates/rom-converto-gui/pnpm-lock.yaml

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: gui-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            gui-${{ matrix.target }}-cargo-

      - name: Install frontend dependencies
        working-directory: crates/rom-converto-gui
        run: pnpm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: crates/rom-converto-gui
          tauriScript: pnpm tauri
          args: --target ${{ matrix.target }}

      - name: Package binary (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p artifact
          cp target/${{ matrix.target }}/release/rom-converto-gui artifact/

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path artifact
          Copy-Item "target/${{ matrix.target }}/release/rom-converto-gui.exe" -Destination artifact

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: rom-converto-gui-${{ matrix.classifier }}
          path: artifact/
